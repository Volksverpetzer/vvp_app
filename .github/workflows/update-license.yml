name: Update licenses on prerelease

on:
  pull_request:
    types: [closed]
    branches:
      - prerelease

jobs:
  update-licenses:
    if: ${{ github.event.pull_request.merged }}
    runs-on: ubuntu-slim
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🏗 Setup environment
        uses: ./.github/actions/setup-node-pnpm-expo
        with:
          setup-node: "false"

      - name: 🖊️ Generate license JSON
        run: |
          pnpm install -g npm-license-crawler
          npm-license-crawler \
            --json src/screens/Settings/components/licenses/licenseData.json \
            --onlyDirectDependencies \
            --onlyProdDependencies

      - name: 👷 Build license data.tsx
        run: |
          echo "export default " > src/screens/Settings/components/licenses/data.tsx
          cat src/screens/Settings/components/licenses/licenseData.json >> src/screens/Settings/components/licenses/data.tsx
          echo ";" >> src/screens/Settings/components/licenses/data.tsx
          rm src/screens/Settings/components/licenses/licenseData.json
          pnpm exec prettier --write src/screens/Settings/components/licenses/data.tsx

      - name: 🫸 Create Pull Request with license data changes
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Bump license data"
          branch: bot/update-license-data
          base: prerelease
          title: "Update license data"
          delete-branch: true
