name: Update license data

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update license data on"
        required: false
        default: "prerelease"

jobs:
  update-licenses:
    runs-on: ubuntu-slim
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: 🏗 Setup environment
        uses: ./.github/actions/setup-node-pnpm-expo
        with:
          setup-node: "false"

      - name: 🖊️ Generate license data
        run: pnpm prepare:licenses

      - name: 🫸 Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/screens/Settings/components/licenses/data.tsx
          if git diff --cached --quiet; then
            echo "No license changes to commit."
          else
            git commit -m "chore: update license data"
            git push
          fi
