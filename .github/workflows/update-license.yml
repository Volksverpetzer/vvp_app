# This workflow automatically updates license data and creates a PR with auto-merge enabled.
#
# IMPORTANT: Setup Required
# -------------------------
# This workflow requires a custom token (AUTO_MERGE_TOKEN) with the following permissions:
#
# Why a custom token is needed:
# - GITHUB_TOKEN cannot trigger other workflows (pull_request events)
# - GITHUB_TOKEN cannot enable auto-merge on pull requests
#
# Setup Instructions:
# 1. Create a Personal Access Token (PAT) OR GitHub App:
#
#    Option A - Personal Access Token:
#    - Go to GitHub Settings > Developer settings > Personal access tokens > Fine-grained tokens
#    - Create a token with these permissions:
#      * Contents: Read and write
#      * Pull requests: Read and write
#      * Workflows: Read and write
#
#    Option B - GitHub App:
#    - Create a GitHub App with the same permissions as above
#    - Install the app on this repository
#    - Generate a private key and use it with an app token action
#
# 2. Add the token as a repository secret:
#    - Go to repository Settings > Secrets and variables > Actions
#    - Create a new secret named AUTO_MERGE_TOKEN
#    - Paste your token value
#
# 3. Ensure branch protection rules allow auto-merge:
#    - The 'prerelease' branch should have appropriate protection rules
#    - "Allow auto-merge" must be enabled in repository settings
#
# Note: If AUTO_MERGE_TOKEN is not configured, the auto-merge step will fail
# with a clear error message from GitHub CLI. The PR will still be created,
# but auto-merge will not be enabled.

name: Update licenses on prerelease

on:
  pull_request:
    types: [closed]
    branches:
      - prerelease

jobs:
  update-licenses:
    if: ${{ github.event.pull_request.merged }}
    runs-on: ubuntu-slim
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🏗 Setup environment
        uses: ./.github/actions/setup-node-pnpm-expo
        with:
          setup-node: "false"

      - name: 🖊️ Generate license JSON
        run: |
          pnpm install -g npm-license-crawler
          npm-license-crawler \
            --json src/screens/Settings/components/licenses/licenseData.json \
            --onlyDirectDependencies \
            --onlyProdDependencies

      - name: 👷 Build license data.tsx
        run: |
          echo "export default " > src/screens/Settings/components/licenses/data.tsx
          cat src/screens/Settings/components/licenses/licenseData.json >> src/screens/Settings/components/licenses/data.tsx
          echo ";" >> src/screens/Settings/components/licenses/data.tsx
          rm src/screens/Settings/components/licenses/licenseData.json
          pnpm exec prettier --write src/screens/Settings/components/licenses/data.tsx

      - name: 🫸 Create Pull Request with license data changes
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AUTO_MERGE_TOKEN }}
          commit-message: "Bump license data"
          branch: bot/update-license-data
          base: prerelease
          title: "Update license data"
          delete-branch: true

      - name: 🤖 Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          gh pr merge $PR_NUMBER --auto --squash --repo ${{ github.repository }}
