name: Expo Preview

on:
  push:
    branches:
      - "*"

jobs:
  expo-preview:
    runs-on: ubuntu-slim
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏗 Setup environment
        uses: ./.github/actions/setup-node-pnpm-expo
        with:
          setup-expo-token: ${{ secrets.EXPO_TOKEN }}

      # --auto derives the EAS Update branch from the git branch (for per-PR QR codes).
      # --environment preview injects EAS env vars — separate from --channel, which targets installed builds.
      # To push to all installed preview builds instead, use: pnpm preview:update
      - name: 🚀 Publish preview
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --non-interactive --auto --environment preview
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          APP: volksverpetzer
